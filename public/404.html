<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Warmup</title>
  <script>
    // GitHub Pages SPA redirect:
    // When GitHub Pages serves 404.html for unknown paths, we redirect back
    // to the app root so the Zustand view-enum router can handle the state.
    sessionStorage.setItem('redirect', window.location.href);
    window.location.replace(window.location.origin + '/eetcod/');
  </script>
</head>
<body></body>
</html>
